name: Build and Deploy Proselyte ShieldSign

on:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Proselyte brand assets
        run: |
          test -f branding/logo/shieldsign-logo-transparent.png || { echo 'LOGO MISSING'; exit 1; }
          echo 'Brand assets verified.'

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          no-cache: true
          build-args: |
            NEXT_PRIVATE_ENCRYPTION_KEY=c9406e232c539860a85710332f2d60b7f8192cff352eefa10d2804f7d37c045d
            NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY=d4648c90f4134ef81d9c41da8f2aa5ba6cf5afbe5e475de6ab5abe66fe9f02cd
          tags: |
            ghcr.io/audacities-advertising/shieldsign:latest

      - name: Deploy to core-server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CORE_SERVER_HOST }}
          username: root
          key: ${{ secrets.CORE_SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u audacities-advertising --password-stdin
            sed -i 's|image:.*documenso.*|image: ghcr.io/audacities-advertising/shieldsign:latest|g' /opt/documenso/docker-compose.yml
            cd /opt/documenso && docker compose pull && docker compose up -d --force-recreate
            echo Deployed ShieldSign at $(date)

      - name: Notify on failure
        if: failure()
        run: echo 'Build failed. Previous image still running.'
